<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swing Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #082f49; /* Sky 900 - Deep Sea Blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevent scroll on touch */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(8, 47, 73, 0.9);
            padding: 2rem 4rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #0ea5e9;
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .screen.active {
            display: flex;
        }

        h1 {
            color: #e0f2fe;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            color: #0ea5e9;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }

        .high-score {
            color: #f97316;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        p {
            color: #bae6fd;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        button {
            background: #0ea5e9;
            color: #ffffff;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        button:hover {
            background: #38bdf8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        #hud {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: #e0f2fe;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            display: flex;
            gap: 1.5rem;
        }

        .lives-container {
            color: #f43f5e;
        }

        #musicToggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(8, 47, 73, 0.6);
            color: #bae6fd;
            border: 1px solid #0ea5e9;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: all 0.2s ease;
            z-index: 100;
        }

        #musicToggle:hover {
            background: rgba(14, 165, 233, 0.4);
        }

        #pauseBtn {
            position: absolute;
            top: 3.5rem;
            right: 1rem;
            background: rgba(8, 47, 73, 0.6);
            color: #bae6fd;
            border: 1px solid #0ea5e9;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: all 0.2s ease;
            z-index: 100;
            display: none;
        }

        #pauseBtn:hover {
            background: rgba(14, 165, 233, 0.4);
        }

        .instructions {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="musicToggle" onclick="toggleMusic()">🔇 Music: OFF</div>
    <div id="pauseBtn" onclick="togglePause()">⏸️ Pause</div>

    <div id="hud">
        <div>Level: <span id="levelText">1</span></div>
        <div class="lives-container">Lives: <span id="livesText">3</span></div>
    </div>

    <div id="ui-layer">
        <!-- Main Menu -->
        <div id="menuScreen" class="screen active">
            <h1>Swing Master</h1>
            <div class="high-score">High Score: Level <span id="highScoreText">0</span></div>
            <p>Tap/Click & Hold to grapple.<br>Release to fly.</p>
            <button onclick="startGame()">Play Game</button>
        </div>

        <!-- Level Complete -->
        <div id="winScreen" class="screen">
            <h1>Awesome!</h1>
            <h2>Level Complete</h2>
            <button onclick="nextLevel()">Next Level</button>
        </div>

        <!-- Lost a Life -->
        <div id="loseScreen" class="screen">
            <h1>Ouch!</h1>
            <h2>You fell</h2>
            <button onclick="restartLevel()">Try Again</button>
        </div>

        <!-- Game Over (Out of Lives) -->
        <div id="gameOverScreen" class="screen">
            <h1>Game Over</h1>
            <h2 style="color: #f43f5e;">Out of Lives!</h2>
            <button onclick="returnToMenu()">Main Menu</button>
        </div>
        
        <!-- Pause Screen -->
        <div id="pauseScreen" class="screen">
            <h1>Paused</h1>
            <h2>Take a breath!</h2>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button onclick="togglePause()">Continue</button>
                <button onclick="returnToMenu()">Main Menu</button>
            </div>
        </div>

        <!-- Game Completed -->
        <div id="endScreen" class="screen">
            <h1>Victory!</h1>
            <h2>You beat all levels!</h2>
            <button onclick="returnToMenu()">Main Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const screens = {
            menu: document.getElementById('menuScreen'),
            win: document.getElementById('winScreen'),
            lose: document.getElementById('loseScreen'),
            gameOver: document.getElementById('gameOverScreen'),
            pause: document.getElementById('pauseScreen'),
            end: document.getElementById('endScreen')
        };
        const levelText = document.getElementById('levelText');
        const livesText = document.getElementById('livesText');
        const highScoreText = document.getElementById('highScoreText');
        const pauseBtn = document.getElementById('pauseBtn');

        // Game Configuration
        let width, height;
        let zoom = 1.0;
        let gameState = 'MENU'; // MENU, PLAYING, WIN, LOSE, GAMEOVER, PAUSE
        let currentLevel = 0;
        let lives = 3;
        let highScore = 0;

        // Physics Constants
        const GRAVITY = 0.5; // Slightly lower for an underwater feel
        const FRICTION = 0.996; // Reduced air resistance so momentum carries further

        // Game Objects
        let player = {
            x: 0, y: 0, vx: 0, vy: 0, radius: 15,
            trail: [], hasShield: false, magnetTimer: 0, grappleDisabledTimer: 0
        };
        
        let camera = { x: 0, y: 0 };
        let anchors = [];
        let bouncers = [];
        let powerups = [];
        let finishLine = null;
        let particles = [];
        let levelBottom = 0;

        // Interaction State
        let isPointerDown = false;
        let pointerPos = { x: 0, y: 0 };
        let activeAnchor = null;
        let targetAnchor = null; // Highlighted nearest anchor
        let ropeLength = 0;

        // --- Web Audio API Music Synthesizer ---
        const AudioEngine = {
            ctx: null,
            isPlaying: false,
            noteIndex: 0,
            nextNoteTime: 0,
            // Ambient underwater pentatonic melody
            melody: [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00], 
            // Deep bassline
            bass: [130.81, 130.81, 196.00, 196.00, 174.61, 174.61, 196.00, 196.00], 
            
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            
            toggle() {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                this.isPlaying = !this.isPlaying;
                if (this.isPlaying) {
                    this.nextNoteTime = this.ctx.currentTime + 0.1;
                    this.schedule();
                }
            },
            
            playNote(freq, type, startTime, duration, vol) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(startTime);
                gain.gain.setValueAtTime(0, startTime);
                // Soft attack for an underwater feel
                gain.gain.linearRampToValueAtTime(vol, startTime + 0.1);
                // Exponential decay
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.stop(startTime + duration);
            },
            
            schedule() {
                if (!this.isPlaying) return;
                
                while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    // Play melody (Sine wave for bubbly sound)
                    this.playNote(this.melody[this.noteIndex % this.melody.length], 'sine', this.nextNoteTime, 0.4, 0.1);
                    
                    // Play bass every other note (Triangle for depth)
                    if (this.noteIndex % 2 === 0) {
                        this.playNote(this.bass[(Math.floor(this.noteIndex/2)) % this.bass.length], 'triangle', this.nextNoteTime, 0.8, 0.15);
                    }
                    
                    // Random bubble pop sound effect
                    if (Math.random() < 0.1) {
                        this.playNote(400 + Math.random()*400, 'sine', this.nextNoteTime, 0.1, 0.05);
                    }
                    
                    this.nextNoteTime += 0.4; // Tempo
                    this.noteIndex++;
                }
                
                requestAnimationFrame(() => this.schedule());
            }
        };

        function toggleMusic() {
            AudioEngine.toggle();
            document.getElementById('musicToggle').innerText = AudioEngine.isPlaying ? '🎵 Music: ON' : '🔇 Music: OFF';
        }

        // Procedural Level Generator
        function generateLevel(index) {
            let startX = 100;
            let startY = 300;
            
            let anchors = [];
            let bouncers = [];
            let generatedPowerups = [];
            
            // Difficulty scales with the level index
            let numAnchors = 3 + index * 2; // Level gets longer
            let currentX = 400;
            let currentY = 100;
            
            // Initial safety bouncer
            bouncers.push({ x: 50, y: 550, w: 250, h: 40 });

            for (let i = 0; i < numAnchors; i++) {
                // Anchors get further apart as difficulty increases (but stay within 800px max)
                let maxGap = Math.min(300 + index * 30, 800);
                let xStep = 300 + Math.random() * (maxGap - 300);
                currentX += xStep;
                
                // Vertical variance increases with difficulty
                let yVariance = 100 + Math.min(index * 40, 500);
                currentY += (Math.random() - 0.5) * yVariance;
                
                anchors.push({ x: currentX, y: currentY });
                
                // Bouncers become less frequent and smaller as difficulty increases
                let bouncerChance = Math.max(0.2, 0.7 - (index * 0.05));
                if (Math.random() < bouncerChance) {
                    let bouncerWidth = Math.max(80, 200 - index * 10);
                    bouncers.push({ 
                        x: currentX - xStep / 2 - bouncerWidth / 2, 
                        y: currentY + 300 + Math.random() * 300, 
                        w: bouncerWidth, 
                        h: 40 
                    });
                }

                // Spawn Powerups randomly between anchors
                let powerupChance = 0.40; // 40% chance to spawn a powerup in a gap
                if (Math.random() < powerupChance) {
                    let pType = 'boost';
                    // 1 in 6 chance for a negative power-down (1 negative per 5 positive)
                    let isNegative = Math.random() < (1 / 6);
                    
                    if (isNegative) {
                        let r = Math.random();
                        if (r > 0.66) pType = 'anchor'; // Drags you down
                        else if (r > 0.33) pType = 'zap'; // Disables grapple
                        else pType = 'vortex'; // Flings you backwards
                    } else {
                        let r = Math.random();
                        if (r > 0.9) pType = 'life';
                        else if (r > 0.75) pType = 'shield';
                        else if (r > 0.5) pType = 'magnet';
                        else if (r > 0.3) pType = 'geyser';
                    }

                    generatedPowerups.push({
                        x: currentX - xStep / 2,
                        y: currentY + (Math.random() - 0.5) * 400,
                        type: pType,
                        radius: 18
                    });
                }
            }
            
            let finishX = currentX + 600;

            return {
                start: { x: startX, y: startY },
                anchors: anchors,
                bouncers: bouncers,
                powerups: generatedPowerups,
                finish: { x: finishX, y: 0, w: 100, h: 1000 }
            };
        }

        // --- Core Setup & Events ---

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // Zoom out on mobile devices to see more of the level
            if (width < 600) {
                zoom = 0.55; // Phones
            } else if (width < 1024) {
                zoom = 0.75; // Tablets
            } else {
                zoom = 1.0; // Desktop
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Listeners
        const handleDown = (e) => {
            if (gameState !== 'PLAYING') return;
            if (player.grappleDisabledTimer > 0) return; // Cannot grapple if zapped!
            isPointerDown = true;
            if (targetAnchor) {
                activeAnchor = targetAnchor;
                // Calculate distance to set sturdy rope length
                let dx = activeAnchor.x - player.x;
                let dy = activeAnchor.y - player.y;
                let dist = Math.hypot(dx, dy);
                // Start with the exact distance so it acts rigidly and doesn't snap
                ropeLength = dist; 
                spawnParticles(player.x, player.y, '#e0f2fe', 10);
            }
        };

        const handleUp = (e) => {
            if (gameState !== 'PLAYING') return;
            isPointerDown = false;
            if (activeAnchor) {
                spawnParticles(player.x, player.y, '#e0f2fe', 5);
                activeAnchor = null;
            }
        };

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('touchstart', (e) => {
            // Prevent default behavior to stop scrolling, but allow button clicks
            if(e.target.tagName !== 'BUTTON') e.preventDefault(); 
            handleDown(e);
        }, { passive: false });
        
        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchend', handleUp);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
            }
        });

        // --- Game Management ---

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            if (screens[screenName]) screens[screenName].classList.add('active');
            
            // Show the pause button only during active gameplay or when paused
            if (gameState === 'PLAYING' || gameState === 'PAUSE') {
                pauseBtn.style.display = 'block';
            } else {
                pauseBtn.style.display = 'none';
            }
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSE';
                switchScreen('pause');
            } else if (gameState === 'PAUSE') {
                gameState = 'PLAYING';
                switchScreen(null);
            }
        }

        function startGame() {
            currentLevel = 0;
            lives = 3;
            livesText.innerText = lives;
            loadLevel(currentLevel);
            gameState = 'PLAYING';
            switchScreen(null);

            // Start music automatically on first play
            if (!AudioEngine.ctx) {
                toggleMusic();
            } else if (AudioEngine.ctx.state === 'suspended') {
                AudioEngine.ctx.resume();
            }
        }

        function nextLevel() {
            currentLevel++;
            loadLevel(currentLevel);
            gameState = 'PLAYING';
            switchScreen(null);
        }

        function restartLevel() {
            loadLevel(currentLevel);
            gameState = 'PLAYING';
            switchScreen(null);
        }

        function returnToMenu() {
            gameState = 'MENU';
            switchScreen('menu');
        }

        function loadLevel(index) {
            const data = generateLevel(index);
            player.x = data.start.x;
            player.y = data.start.y;
            player.vx = 0;
            player.vy = 0;
            player.trail = [];
            player.hasShield = false;
            player.magnetTimer = 0;
            player.grappleDisabledTimer = 0;
            
            anchors = data.anchors.map(a => ({ ...a, radius: 10 }));
            bouncers = data.bouncers.map(b => ({ ...b }));
            powerups = data.powerups.map(p => ({ ...p }));
            finishLine = { ...data.finish };
            
            // Calculate the absolute lowest point in the level for the death boundary
            levelBottom = data.start.y; 
            for (let a of anchors) if (a.y > levelBottom) levelBottom = a.y;
            for (let b of bouncers) if (b.y + b.h > levelBottom) levelBottom = b.y + b.h;
            for (let p of powerups) if (p.y > levelBottom) levelBottom = p.y;
            levelBottom += 800; // Add a generous margin for falling off-screen

            activeAnchor = null;
            isPointerDown = false;
            particles = [];
            
            camera.x = player.x - (width / zoom) / 3;
            camera.y = player.y - (height / zoom) / 2;
            
            levelText.innerText = index + 1;
        }

        function spawnParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        // --- Main Loop ---

        function update() {
            if (gameState !== 'PLAYING') return;

            if (player.magnetTimer > 0) player.magnetTimer--;
            if (player.grappleDisabledTimer > 0) player.grappleDisabledTimer--;

            // 1. Find Target Anchor (Nearest in front of player)
            let nearest = null;
            let minDist = Infinity;
            let maxDist = player.magnetTimer > 0 ? 2500 : 1200; // Double range if magnet is active

            for (let a of anchors) {
                let dx = a.x - player.x;
                let dy = a.y - player.y;
                let dist = Math.hypot(dx, dy);
                
                // MADE MORE FORGIVING: Increased max distance and allowed reaching far backwards (-600)
                if (dist < maxDist && dx > -600) { 
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = a;
                    }
                }
            }
            targetAnchor = nearest;

            // 2. Physics & Movement
            player.vy += GRAVITY;
            
            // Apply sturdy hook constraint
            if (activeAnchor && isPointerDown) {
                let dx = player.x - activeAnchor.x;
                let dy = player.y - activeAnchor.y;
                let dist = Math.hypot(dx, dy);
                
                if (dist > ropeLength) {
                    let nx = dx / dist;
                    let ny = dy / dist;

                    // Positional correction: rigidly pull player to the rope radius
                    player.x = activeAnchor.x + nx * ropeLength;
                    player.y = activeAnchor.y + ny * ropeLength;

                    // Velocity correction: remove outward radial velocity (pendulum movement)
                    let vDotN = player.vx * nx + player.vy * ny;
                    if (vDotN > 0) {
                        player.vx -= vDotN * nx;
                        player.vy -= vDotN * ny;
                        
                        // Stronger momentum boost to keep the swing fast and exciting
                        player.vx *= 1.025;
                        player.vy *= 1.025;
                    }
                }
            }

            // Apply friction/air resistance
            player.vx *= FRICTION;
            player.vy *= FRICTION;

            // Update Position
            player.x += player.vx;
            player.y += player.vy;

            // Trail update
            player.trail.push({ x: player.x, y: player.y });
            if (player.trail.length > 20) {
                player.trail.shift();
            }

            // 3. Collisions
            
            // Powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                let pu = powerups[i];
                let dist = Math.hypot(player.x - pu.x, player.y - pu.y);
                
                if (dist < player.radius + pu.radius) {
                    if (pu.type === 'boost') {
                        // Forward and upward jet boost
                        player.vx += 25;
                        player.vy -= 15;
                        spawnParticles(pu.x, pu.y, '#fde047', 30);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(800, 'sine', AudioEngine.ctx.currentTime, 0.2, 0.2);
                        }
                    } else if (pu.type === 'life') {
                        // Extra life
                        lives++;
                        livesText.innerText = lives;
                        spawnParticles(pu.x, pu.y, '#f43f5e', 30);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(523.25, 'sine', AudioEngine.ctx.currentTime, 0.1, 0.2);
                            AudioEngine.playNote(659.25, 'sine', AudioEngine.ctx.currentTime + 0.1, 0.3, 0.2);
                        }
                    } else if (pu.type === 'geyser') {
                        // Massive vertical boost
                        player.vy = -40;
                        spawnParticles(pu.x, pu.y, '#4ade80', 40);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(300, 'triangle', AudioEngine.ctx.currentTime, 0.4, 0.3);
                        }
                    } else if (pu.type === 'shield') {
                        // Fall protection shield
                        player.hasShield = true;
                        spawnParticles(pu.x, pu.y, '#60a5fa', 20);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(600, 'sine', AudioEngine.ctx.currentTime, 0.3, 0.2);
                        }
                    } else if (pu.type === 'magnet') {
                        // Magnetize grapple range
                        player.magnetTimer = 300; // 5 seconds at 60fps
                        spawnParticles(pu.x, pu.y, '#2dd4bf', 30);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(700, 'sine', AudioEngine.ctx.currentTime, 0.5, 0.2);
                        }
                    } else if (pu.type === 'anchor') {
                        // Drops you straight down
                        player.vy += 30;
                        spawnParticles(pu.x, pu.y, '#475569', 30);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(100, 'square', AudioEngine.ctx.currentTime, 0.4, 0.3);
                        }
                    } else if (pu.type === 'zap') {
                        // Instantly breaks rope and disables grapple for 1 second
                        activeAnchor = null;
                        isPointerDown = false;
                        player.grappleDisabledTimer = 60; 
                        spawnParticles(pu.x, pu.y, '#facc15', 30);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(900, 'sawtooth', AudioEngine.ctx.currentTime, 0.2, 0.2);
                        }
                    } else if (pu.type === 'vortex') {
                        // Flings you rapidly backward
                        player.vx = -30;
                        player.vy = -15;
                        spawnParticles(pu.x, pu.y, '#c084fc', 40);
                        if (AudioEngine.isPlaying && AudioEngine.ctx) {
                            AudioEngine.playNote(300, 'sine', AudioEngine.ctx.currentTime, 0.5, 0.3);
                        }
                    }
                    powerups.splice(i, 1); // Remove collected powerup
                }
            }

            // Bouncers
            for (let b of bouncers) {
                // Expanded AABB for smooth fast collisions
                let pNextX = player.x + player.vx;
                let pNextY = player.y + player.vy;
                
                if (pNextX + player.radius > b.x &&
                    pNextX - player.radius < b.x + b.w &&
                    pNextY + player.radius > b.y &&
                    pNextY - player.radius < b.y + b.h) {
                    
                    // Bounce mechanics
                    player.vy = -20; // Strong upward force
                    player.vx = Math.max(player.vx * 1.2, 12); // Boost forward momentum slightly
                    spawnParticles(player.x, player.y + player.radius, '#f97316', 20);
                    
                    // Prevent sticking inside pad
                    player.y = b.y - player.radius;
                    
                    // Auto-release hook on bounce
                    if (activeAnchor) {
                        activeAnchor = null;
                        isPointerDown = false;
                    }
                }
            }

            // Finish Line (Infinite Height)
            if (player.x + player.radius > finishLine.x &&
                player.x - player.radius < finishLine.x + finishLine.w) {
                
                // Update High Score if this level is the highest completed
                let completedLevel = currentLevel + 1;
                if (completedLevel > highScore) {
                    highScore = completedLevel;
                    highScoreText.innerText = highScore;
                }
                
                gameState = 'WIN';
                switchScreen('win');
                spawnParticles(player.x, player.y, '#0ea5e9', 50);
            }

            // Death / Fall off screen
            if (player.y > levelBottom || player.x < camera.x - (500 / zoom)) {
                if (player.hasShield && player.y > levelBottom) {
                    // Shield saves the player from falling!
                    player.hasShield = false;
                    player.vy = -45; // Massive bounce back up
                    player.y = levelBottom - 50;
                    spawnParticles(player.x, player.y, '#60a5fa', 50);
                    if (AudioEngine.isPlaying && AudioEngine.ctx) {
                        AudioEngine.playNote(200, 'triangle', AudioEngine.ctx.currentTime, 0.5, 0.4);
                    }
                } else {
                    lives--;
                    livesText.innerText = lives;
                    
                    if (lives > 0) {
                        gameState = 'LOSE';
                        switchScreen('lose');
                    } else {
                        gameState = 'GAMEOVER';
                        switchScreen('gameOver');
                    }
                }
            }

            // 4. Update Camera (Smooth Follow)
            let targetCamX = player.x - (width / zoom) * 0.3;
            let targetCamY = player.y - (height / zoom) * 0.6;
            
            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            // 5. Update Particles (Bubbles behavior)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                
                // Bubbles float upwards!
                p.vy -= GRAVITY * 0.8; 
                
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Background Clear
            ctx.fillStyle = '#082f49'; // Deep sea blue
            ctx.fillRect(0, 0, width, height);

            // Instead of checking !levels.length, check if anchors are generated
            if (gameState === 'MENU' && !anchors.length) return;

            ctx.save();
            ctx.scale(zoom, zoom);
            ctx.translate(-camera.x, -camera.y);
            
            let worldWidth = width / zoom;
            let worldHeight = height / zoom;

            // Draw Background Distant Bubbles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            let startGridX = Math.floor(camera.x / 150) * 150;
            let startGridY = Math.floor(camera.y / 150) * 150;
            for (let x = startGridX; x < camera.x + worldWidth + 150; x += 150) {
                for (let y = startGridY; y < camera.y + worldHeight + 150; y += 150) {
                    // Pseudo-random offset for background bubbles
                    let ox = Math.sin(x * 12.3 + y * 4.5) * 50;
                    let oy = Math.cos(x * 4.5 + y * 12.3) * 50;
                    ctx.beginPath(); 
                    ctx.arc(x + ox, y + oy, 4 + Math.abs(ox%6), 0, Math.PI * 2); 
                    ctx.fill();
                }
            }

            // Draw Finish Line (Glowing Column of Light)
            if (finishLine) {
                let startY = Math.floor(camera.y / 20) * 20 - 20;
                let endY = camera.y + worldHeight + 20;
                
                let gradient = ctx.createLinearGradient(finishLine.x, 0, finishLine.x + finishLine.w, 0);
                gradient.addColorStop(0, 'rgba(14, 165, 233, 0)');
                gradient.addColorStop(0.5, 'rgba(14, 165, 233, 0.4)');
                gradient.addColorStop(1, 'rgba(14, 165, 233, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(finishLine.x, startY, finishLine.w, endY - startY);
            }

            // Draw Bouncers (Sea Anemones)
            for (let b of bouncers) {
                ctx.fillStyle = '#ea580c'; // Darker orange base
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.w, b.h, b.h / 2);
                ctx.fill();
                
                // Squiggly anemone tentacles on top
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#f97316'; // Bright orange tentacles
                for(let tx = b.x + 10; tx < b.x + b.w - 10; tx += 15) {
                    ctx.beginPath();
                    let wave = Math.sin(Date.now() / 200 + tx) * 5;
                    ctx.moveTo(tx, b.y + 5);
                    ctx.quadraticCurveTo(tx + wave, b.y - 10, tx + 5 + wave, b.y - 15);
                    ctx.stroke();
                }
            }

            // Draw Powerups
            for (let pu of powerups) {
                let floatY = pu.y + Math.sin(Date.now() / 300 + pu.x) * 10;
                
                if (pu.type === 'boost') {
                    // Golden Boost Orb
                    ctx.fillStyle = '#fde047';
                    ctx.shadowColor = '#fde047';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#854d0e';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('>>', pu.x, floatY);
                } else if (pu.type === 'life') {
                    // Life Bubble
                    ctx.fillStyle = 'rgba(244, 63, 94, 0.2)';
                    ctx.strokeStyle = '#f43f5e';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#f43f5e';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius * 1.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.font = '18px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('❤️', pu.x, floatY + 2);
                } else if (pu.type === 'geyser') {
                    // Upward Geyser
                    ctx.fillStyle = '#4ade80';
                    ctx.shadowColor = '#4ade80';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#14532d';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏫', pu.x, floatY);
                } else if (pu.type === 'shield') {
                    // Bubble Shield
                    ctx.fillStyle = 'rgba(96, 165, 250, 0.3)';
                    ctx.strokeStyle = '#60a5fa';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#60a5fa';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius * 1.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🛡️', pu.x, floatY + 2);
                } else if (pu.type === 'magnet') {
                    // Grapple Magnet
                    ctx.fillStyle = '#2dd4bf';
                    ctx.shadowColor = '#2dd4bf';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#042f2e';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🧲', pu.x, floatY + 2);
                } else if (pu.type === 'anchor') {
                    // Heavy Anchor
                    ctx.fillStyle = '#475569';
                    ctx.shadowColor = '#0f172a';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⚓', pu.x, floatY + 2);
                } else if (pu.type === 'zap') {
                    // Zap / Jellyfish Sting
                    ctx.fillStyle = '#facc15';
                    ctx.shadowColor = '#facc15';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#713f12';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⚡', pu.x, floatY + 2);
                } else if (pu.type === 'vortex') {
                    // Whirlpool Vortex
                    ctx.fillStyle = '#c084fc';
                    ctx.shadowColor = '#9333ea';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x, floatY, pu.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#4c1d95';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🌀', pu.x, floatY + 2);
                }
                ctx.shadowBlur = 0; // Reset
            }

            // Draw Anchors (Glowing Pearls)
            for (let a of anchors) {
                // Outer shell
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#e0f2fe';
                ctx.fill();
                
                // Pearl shine
                ctx.beginPath();
                ctx.arc(a.x - 3, a.y - 3, a.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                if (a === activeAnchor) {
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.radius * 1.5, 0, Math.PI * 2);
                    ctx.strokeStyle = '#0ea5e9'; // Cyan grab ring
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else if (a === targetAnchor && gameState === 'PLAYING') {
                    // Pulsing target ring
                    let time = Date.now() / 150;
                    let pulseRadius = a.radius * 1.5 + Math.sin(time) * 5;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, pulseRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(14, 165, 233, 0.7)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }

            // Draw Rope (Tentacle)
            if (activeAnchor) {
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(activeAnchor.x, activeAnchor.y);
                ctx.strokeStyle = '#a855f7'; // Purple tentacle
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // Draw Player Trail (Ink/Bubbles)
            if (player.trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(player.trail[0].x, player.trail[0].y);
                for (let i = 1; i < player.trail.length; i++) {
                    ctx.lineTo(player.trail[i].x, player.trail[i].y);
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = player.radius * 0.8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            // Draw Player (Octopus)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Blink if grapple is disabled (zapped)
            if (player.grappleDisabledTimer > 0) {
                ctx.globalAlpha = (Math.floor(Date.now() / 100) % 2 === 0) ? 0.5 : 1.0;
            }

            // Draw active auras
            if (player.hasShield) {
                ctx.beginPath();
                ctx.arc(0, 0, player.radius * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(96, 165, 250, 0.2)';
                ctx.strokeStyle = 'rgba(96, 165, 250, 0.8)';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
            }

            if (player.magnetTimer > 0) {
                ctx.beginPath();
                ctx.arc(0, 0, player.radius * 2 + Math.sin(Date.now() / 100) * 10, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(45, 212, 191, 0.5)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Calculate squash and stretch based on velocity
            let velMag = Math.hypot(player.vx, player.vy);
            let angle = Math.atan2(player.vy, player.vx);
            let stretch = 1 + velMag * 0.02;
            let squash = 1 / stretch;
            
            if (velMag > 0.5) {
                ctx.rotate(angle);
                ctx.scale(stretch, squash);
            } else {
                ctx.rotate(Math.PI / 2); // Default face right
            }

            // Octopus Tentacles (Trailing behind)
            ctx.strokeStyle = '#9333ea'; // Deep Purple
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            for(let i = 0; i < 6; i++) { // 6 thick visible tentacles
                let ty = -player.radius * 0.8 + (i * (player.radius * 1.6) / 5);
                ctx.beginPath();
                ctx.moveTo(-player.radius * 0.2, ty);
                let waveX = Math.sin(Date.now()/150 + i) * 8;
                let waveY = Math.cos(Date.now()/200 + i) * 4;
                ctx.quadraticCurveTo(-player.radius * 1.5, ty + waveY, -player.radius * 2.5 + waveX, ty + waveY * 2);
                ctx.stroke();
            }

            // Octopus Body (Bulbous Head)
            ctx.beginPath();
            ctx.arc(player.radius * 0.2, 0, player.radius * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#9333ea'; // Deep Purple
            ctx.fill();
            
            // Octopus Eyes (Larger, cuter)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(player.radius * 0.6, -player.radius * 0.5, player.radius * 0.35, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.radius * 0.6, player.radius * 0.5, player.radius * 0.35, 0, Math.PI * 2); ctx.fill();
            
            // Pupils (Looking forward)
            ctx.fillStyle = '#0f172a';
            if (player.grappleDisabledTimer > 0) {
                // Dizzy eyes if zapped
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('x', player.radius * 0.6, -player.radius * 0.5);
                ctx.fillText('x', player.radius * 0.6, player.radius * 0.5);
            } else {
                // Normal pupils
                ctx.beginPath(); ctx.arc(player.radius * 0.75, -player.radius * 0.5, player.radius * 0.15, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(player.radius * 0.75, player.radius * 0.5, player.radius * 0.15, 0, Math.PI * 2); ctx.fill();
            }

            ctx.restore();

            // Draw Particles (Bubbles)
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                
                // Outer bubble ring
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2 + p.life * 4, 0, Math.PI * 2);
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Little bubble shine
                ctx.beginPath();
                ctx.arc(p.x - (p.life * 2), p.y - (p.life * 2), p.life * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize background drawing behind menu initially
        loadLevel(0);
        loop();

    </script>
</body>
