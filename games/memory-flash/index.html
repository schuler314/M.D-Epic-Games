<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Flash Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap');

        body {
            background-color: #0f172a; /* Dark slate bg */
            font-family: 'Inter', sans-serif;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }

        /* SVG styles and transitions */
        .wedge {
            transition: fill 0.1s ease-out, filter 0.1s ease-out;
            cursor: pointer;
            filter: brightness(1);
        }
        
        .wedge.active {
            filter: brightness(1.6) drop-shadow(0 0 15px var(--glow-color));
            z-index: 10;
        }

        .hub-text {
            font-family: 'Anton', sans-serif;
            letter-spacing: 0.05em;
        }

        /* Control buttons interactive states */
        .ctrl-btn {
            transition: transform 0.1s, fill 0.1s;
            cursor: pointer;
        }
        
        .ctrl-btn:active {
            transform: scale(0.92);
        }

        /* Pattern for textured plastic look */
        .wedge-texture {
            pointer-events: none;
            mix-blend-mode: multiply;
            opacity: 0.25;
        }

        /* Modal specific animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate {
            animation: fadeIn 0.2s ease-out forwards;
        }
        
        /* Custom scrollbar for leaderboard */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center text-white relative">

    <div class="absolute top-4 left-0 w-full text-center z-10 flex justify-between px-8 max-w-2xl mx-auto right-0 pointer-events-none">
        <div class="flex flex-col text-left">
            <span class="text-slate-400 text-sm font-bold uppercase tracking-wider">Score</span>
            <span id="scoreDisplay" class="text-4xl font-bold text-emerald-400">0</span>
        </div>
        <div class="flex flex-col text-right">
            <span class="text-slate-400 text-sm font-bold uppercase tracking-wider">High Score</span>
            <span id="highScoreDisplay" class="text-4xl font-bold text-amber-400">0</span>
        </div>
    </div>

    <div id="gameContainer" class="relative w-full max-w-[500px] aspect-square flex items-center justify-center p-4">
        <svg id="gameBoard" viewBox="0 0 400 400" class="w-full h-full drop-shadow-2xl overflow-visible">
            <defs>
                <pattern id="reflectorPattern" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <rect width="12" height="12" fill="none" />
                    <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.8"/>
                    <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" transform="translate(1,1)"/>
                </pattern>
                <filter id="hubShadow">
                    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
                </filter>
            </defs>

            <!-- Outer Black Casing -->
            <circle cx="200" cy="200" r="195" fill="#18181b" stroke="#09090b" stroke-width="4" />
            
            <g id="wedgesGroup"></g>
            <g id="textureGroup"></g>

            <!-- Inner Black Hub -->
            <circle cx="200" cy="200" r="75" fill="#1f2937" stroke="#0f172a" stroke-width="6" filter="url(#hubShadow)" />
            
            <!-- Speaker Grills -->
            <path d="M 165 150 A 45 45 0 0 1 235 150" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
            <path d="M 175 140 A 35 35 0 0 1 225 140" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />
            <path d="M 185 130 A 25 25 0 0 1 215 130" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

            <text x="200" y="185" fill="#e2e8f0" font-size="22" text-anchor="middle" class="hub-text">MEMORY</text>
            <text x="200" y="215" fill="#e2e8f0" font-size="30" text-anchor="middle" class="hub-text">FLASH<tspan font-size="12" dy="-14" font-family="sans-serif">®</tspan></text>

            <!-- Controls: Duplicates removed, pure SVG icons kept -->
            <g class="ctrl-group" id="btnRestart" transform="translate(160, 230)">
                <rect class="ctrl-btn" x="-12" y="-12" width="24" height="24" rx="4" fill="#334155" stroke="#0f172a" stroke-width="2" />
                <path d="M-5 2 A 6 6 0 1 1 1 -4 L 1 0 M 1 -4 L -3 -4" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" pointer-events="none" />
            </g>

            <g class="ctrl-group" id="btnSound" transform="translate(240, 230)">
                <rect class="ctrl-btn" x="-12" y="-12" width="24" height="24" rx="4" fill="#334155" stroke="#0f172a" stroke-width="2" />
                <path id="soundIcon" d="M-4 -3 L-4 3 L-1 3 L2 6 L2 -6 L-1 -3 Z M5 -3 A 4 4 0 0 1 5 3" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linejoin="round" pointer-events="none" />
            </g>
        </svg>
    </div>

    <!-- Start & Leaderboard Modal -->
    <div id="startModal" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-6 w-full max-w-md modal-animate flex flex-col gap-6">
            <h1 class="text-3xl font-bold text-center tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 hub-text">MEMORY FLASH</h1>
            
            <div class="space-y-2">
                <label class="text-sm text-slate-400 uppercase tracking-wider font-semibold">Select Difficulty</label>
                <div class="grid grid-cols-3 gap-2">
                    <button class="diff-btn bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded-lg py-2 transition-colors active" data-diff="Easy">Easy</button>
                    <button class="diff-btn bg-slate-900 hover:bg-slate-600 border border-slate-700 rounded-lg py-2 transition-colors" data-diff="Normal">Normal</button>
                    <button class="diff-btn bg-slate-900 hover:bg-slate-600 border border-slate-700 rounded-lg py-2 transition-colors" data-diff="Hard">Hard</button>
                </div>
            </div>

            <button id="mainStartBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold text-lg py-3 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all active:scale-95">
                START GAME
            </button>

            <div class="border-t border-slate-700 pt-4 flex flex-col min-h-[220px]">
                <h2 class="text-sm text-slate-400 uppercase tracking-wider font-semibold mb-3 flex justify-between items-center">
                    Top 10 Global
                    <span id="loadingScores" class="text-xs text-blue-400 animate-pulse hidden">Loading...</span>
                </h2>
                <div id="leaderboardList" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                    <!-- Scores injected via JS -->
                    <div class="text-center text-slate-500 text-sm py-4 italic">Fetching scores...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over / High Score Modal -->
    <div id="gameOverModal" class="absolute inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-800 border-2 border-amber-500/50 rounded-2xl shadow-[0_0_30px_rgba(245,158,11,0.2)] p-6 w-full max-w-sm modal-animate flex flex-col gap-5 text-center">
            <h2 class="text-3xl font-bold text-amber-400 mb-1">GAME OVER</h2>
            <p class="text-slate-300">You scored <span id="finalScoreDisplay" class="text-2xl font-bold text-white ml-1">0</span></p>
            
            <div id="newHighScoreSection" class="hidden flex-col gap-4 mt-2">
                <div class="bg-amber-500/10 border border-amber-500/30 text-amber-300 py-2 px-3 rounded-lg text-sm">
                    🎉 You made it to the Top 10!
                </div>
                <input type="text" id="playerNameInput" maxlength="12" placeholder="ENTER YOUR NAME" class="bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-center font-bold text-white uppercase focus:outline-none focus:border-amber-400 transition-colors">
                <button id="submitScoreBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-3 rounded-xl transition-all active:scale-95">
                    SUBMIT SCORE
                </button>
            </div>

            <div id="standardGameOverSection" class="hidden flex-col gap-3 mt-4">
                <button id="playAgainBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                    PLAY AGAIN
                </button>
                <button id="menuBtn" class="text-slate-400 text-sm hover:text-white transition-colors py-2">
                    Back to Menu
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Initialize Supabase
        const supabaseUrl = 'https://apgfskdxexlyyavmhdlg.supabase.co';
        const supabaseKey = 'sb_publishable_rvwuan8wg1tyegGFSt2jMA_E1CJaM5L';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // --- GAME CONFIG & STATE ---
        const DIFFICULTIES = {
            'Easy':   { flashDurationMs: 600, pauseBetweenMs: 250, playerTimeoutMs: 8000 },
            'Normal': { flashDurationMs: 400, pauseBetweenMs: 150, playerTimeoutMs: 5000 },
            'Hard':   { flashDurationMs: 200, pauseBetweenMs: 100, playerTimeoutMs: 3000 }
        };
        
        let currentDifficultyName = 'Easy';
        let currentConfig = DIFFICULTIES[currentDifficultyName];
        let minScoreForLeaderboard = 0;
        let globalTopScoresCount = 0;

        const BOARD_CONFIG = { outerRadius: 190, innerRadius: 80 };

        const WEDGE_COLORS = [
            { id: 0, name: 'blue',   dim: '#0369a1', bright: '#38bdf8', start: 0,   end: 60,   freq: 329.63 }, // E4
            { id: 1, name: 'green',  dim: '#15803d', bright: '#4ade80', start: 60,  end: 120,  freq: 440.00 }, // A4
            { id: 2, name: 'yellow', dim: '#a16207', bright: '#facc15', start: 120, end: 180,  freq: 554.37 }, // C#5
            { id: 3, name: 'orange', dim: '#c2410c', bright: '#fb923c', start: 180, end: 240,  freq: 659.25 }, // E5
            { id: 4, name: 'red',    dim: '#b91c1c', bright: '#f87171', start: 240, end: 300,  freq: 880.00 }, // A5
            { id: 5, name: 'purple', dim: '#6b21a8', bright: '#c084fc', start: 300, end: 360,  freq: 1108.73 } // C#6
        ];

        // --- DOM Elements ---
        const startModal = document.getElementById('startModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const leaderboardList = document.getElementById('leaderboardList');
        const diffBtns = document.querySelectorAll('.diff-btn');
        const newHighScoreSection = document.getElementById('newHighScoreSection');
        const standardGameOverSection = document.getElementById('standardGameOverSection');
        const playerNameInput = document.getElementById('playerNameInput');

        // --- SUPABASE FUNCTIONS ---
        async function fetchLeaderboard() {
            document.getElementById('loadingScores').classList.remove('hidden');
            
            try {
                const { data, error } = await supabase
                    .schema('MemoryFlash')
                    .from('HighScores')
                    .select('*')
                    .order('score', { ascending: false })
                    .limit(10);

                if (error) throw error;

                leaderboardList.innerHTML = '';
                
                if (!data || data.length === 0) {
                    leaderboardList.innerHTML = '<div class="text-center text-slate-500 text-sm py-4">No scores yet. Be the first!</div>';
                    minScoreForLeaderboard = 0;
                    globalTopScoresCount = 0;
                } else {
                    data.forEach((entry, index) => {
                        const row = document.createElement('div');
                        row.className = 'flex items-center justify-between bg-slate-700/50 rounded px-3 py-2 text-sm';
                        
                        let rankColor = 'text-slate-400';
                        if (index === 0) rankColor = 'text-amber-400 font-bold';
                        else if (index === 1) rankColor = 'text-slate-300 font-bold';
                        else if (index === 2) rankColor = 'text-amber-700 font-bold';

                        row.innerHTML = `
                            <div class="flex items-center gap-3">
                                <span class="w-4 ${rankColor}">${index + 1}</span>
                                <span class="text-white font-medium truncate max-w-[120px]">${entry.player_name}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs text-slate-500 px-1.5 py-0.5 rounded bg-slate-800">${entry.difficulty[0]}</span>
                                <span class="text-emerald-400 font-bold w-6 text-right">${entry.score}</span>
                            </div>
                        `;
                        leaderboardList.appendChild(row);
                    });

                    globalTopScoresCount = data.length;
                    minScoreForLeaderboard = data.length < 10 ? 0 : data[data.length - 1].score;
                }
            } catch (err) {
                console.error("Error fetching leaderboard:", err);
                leaderboardList.innerHTML = '<div class="text-center text-red-400 text-sm py-4">Failed to load scores.</div>';
            } finally {
                document.getElementById('loadingScores').classList.add('hidden');
            }
        }

        async function submitHighScore() {
            const name = playerNameInput.value.trim().toUpperCase() || 'ANONYMOUS';
            const btn = document.getElementById('submitScoreBtn');
            
            btn.disabled = true;
            btn.innerText = 'SAVING...';
            btn.classList.add('opacity-75');

            try {
                const { error } = await supabase
                    .schema('MemoryFlash')
                    .from('HighScores')
                    .insert([
                        { player_name: name, score: score, difficulty: currentDifficultyName }
                    ]);

                if (error) throw error;

                // Success
                playerNameInput.value = '';
                gameOverModal.classList.add('hidden');
                startModal.classList.remove('hidden');
                await fetchLeaderboard();

            } catch (err) {
                console.error("Error saving score:", err);
                alert("Failed to save score. Please check console.");
            } finally {
                btn.disabled = false;
                btn.innerText = 'SUBMIT SCORE';
                btn.classList.remove('opacity-75');
            }
        }

        // --- AUDIO ENGINE ---
        let audioCtx;
        let masterGain;
        let soundEnabled = true;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
        }

        function playTone(freq, type = 'triangle', duration = 0.4) {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            osc.connect(gain);
            gain.connect(masterGain);

            osc.start();
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.02);
            gain.gain.setValueAtTime(1, audioCtx.currentTime + duration - 0.05);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

            osc.stop(audioCtx.currentTime + duration);
        }

        function playErrorSound() {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc1.type = 'sawtooth';
            osc2.type = 'sawtooth';
            
            osc1.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(160, audioCtx.currentTime);
            
            osc1.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1);
            osc2.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 1);

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(masterGain);

            osc1.start();
            osc2.start();
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            osc1.stop(audioCtx.currentTime + 1);
            osc2.stop(audioCtx.currentTime + 1);
        }

        // --- SVG GENERATION ---
        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = angleInDegrees * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        function createWedgePath(cx, cy, innerRadius, outerRadius, startAngle, endAngle) {
            const startOuter = polarToCartesian(cx, cy, outerRadius, endAngle);
            const endOuter = polarToCartesian(cx, cy, outerRadius, startAngle);
            const startInner = polarToCartesian(cx, cy, innerRadius, endAngle);
            const endInner = polarToCartesian(cx, cy, innerRadius, startAngle);

            const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

            return [
                "M", startOuter.x, startOuter.y,
                "A", outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
                "L", endInner.x, endInner.y,
                "A", innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y,
                "Z"
            ].join(" ");
        }

        const wedgesGroup = document.getElementById('wedgesGroup');
        const textureGroup = document.getElementById('textureGroup');
        const wedgeElements = [];

        WEDGE_COLORS.forEach(color => {
            const pathString = createWedgePath(200, 200, BOARD_CONFIG.innerRadius, BOARD_CONFIG.outerRadius, color.start, color.end);
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathString);
            path.setAttribute("fill", color.dim);
            path.setAttribute("stroke", "#18181b"); 
            path.setAttribute("stroke-width", "6");
            path.setAttribute("class", "wedge");
            path.style.setProperty("--glow-color", color.bright);
            path.dataset.id = color.id;
            
            path.addEventListener('pointerdown', () => handleWedgeClick(color.id));
            
            wedgesGroup.appendChild(path);
            wedgeElements.push(path);

            const texture = document.createElementNS("http://www.w3.org/2000/svg", "path");
            texture.setAttribute("d", pathString);
            texture.setAttribute("fill", "url(#reflectorPattern)");
            texture.setAttribute("class", "wedge-texture");
            textureGroup.appendChild(texture);
        });

        // --- GAME LOGIC ---
        let sequence = [];
        let playerStep = 0;
        let isAnimating = false;
        let isPlayerTurn = false;
        let score = 0;
        let localHighScore = localStorage.getItem('memoryFlashHighScore') || 0;
        let flashTimeouts = {};
        let playerTimer;

        document.getElementById('highScoreDisplay').innerText = localHighScore;

        function updateScore(newScore) {
            score = newScore;
            document.getElementById('scoreDisplay').innerText = score;
            if (score > localHighScore) {
                localHighScore = score;
                localStorage.setItem('memoryFlashHighScore', localHighScore);
                document.getElementById('highScoreDisplay').innerText = localHighScore;
            }
        }

        async function startGame() {
            initAudio();
            startModal.classList.add('hidden');
            gameOverModal.classList.add('hidden');
            
            currentConfig = DIFFICULTIES[currentDifficultyName];
            sequence = [];
            updateScore(0);
            isAnimating = true;
            isPlayerTurn = false;
            
            await sleep(500);
            nextRound();
        }

        function nextRound() {
            playerStep = 0;
            sequence.push(Math.floor(Math.random() * 6));
            playSequence();
        }

        async function playSequence() {
            isAnimating = true;
            isPlayerTurn = false;
            clearTimeout(playerTimer);

            await sleep(600); 

            for (let i = 0; i < sequence.length; i++) {
                const colorId = sequence[i];
                activateWedge(colorId, currentConfig.flashDurationMs);
                await sleep(currentConfig.flashDurationMs + currentConfig.pauseBetweenMs);
            }

            isAnimating = false;
            isPlayerTurn = true;
            resetPlayerTimer();
        }

        function activateWedge(id, durationMs, userTriggered = false) {
            const wedge = wedgeElements[id];
            const colorData = WEDGE_COLORS[id];
            
            if (flashTimeouts[id]) clearTimeout(flashTimeouts[id]);

            wedge.classList.add('active');
            wedge.setAttribute('fill', colorData.bright);
            
            if (userTriggered) initAudio(); 
            playTone(colorData.freq, 'triangle', durationMs / 1000);

            flashTimeouts[id] = setTimeout(() => {
                wedge.classList.remove('active');
                wedge.setAttribute('fill', colorData.dim);
            }, durationMs);
        }

        function handleWedgeClick(id) {
            if (isAnimating || !isPlayerTurn) return;
            
            resetPlayerTimer();
            activateWedge(id, 300, true);

            if (id === sequence[playerStep]) {
                playerStep++;
                if (playerStep === sequence.length) {
                    isPlayerTurn = false;
                    clearTimeout(playerTimer);
                    updateScore(score + 1);
                    nextRound();
                }
            } else {
                handleGameOver();
            }
        }

        function resetPlayerTimer() {
            clearTimeout(playerTimer);
            if (isPlayerTurn) {
                playerTimer = setTimeout(() => {
                    handleGameOver();
                }, currentConfig.playerTimeoutMs);
            }
        }

        async function handleGameOver() {
            isPlayerTurn = false;
            isAnimating = true;
            clearTimeout(playerTimer);

            playErrorSound();
            
            // Error visual flash
            for (let i = 0; i < 3; i++) {
                wedgeElements.forEach((w, index) => {
                    w.classList.add('active');
                    w.setAttribute('fill', WEDGE_COLORS[index].bright);
                });
                await sleep(150);
                wedgeElements.forEach((w, index) => {
                    w.classList.remove('active');
                    w.setAttribute('fill', WEDGE_COLORS[index].dim);
                });
                await sleep(150);
            }

            isAnimating = false;
            
            // Configure Game Over Modal based on score
            document.getElementById('finalScoreDisplay').innerText = score;
            
            if (score > 0 && (score > minScoreForLeaderboard || globalTopScoresCount < 10)) {
                newHighScoreSection.classList.remove('hidden');
                newHighScoreSection.classList.add('flex');
                standardGameOverSection.classList.add('hidden');
                standardGameOverSection.classList.remove('flex');
                setTimeout(() => playerNameInput.focus(), 100);
            } else {
                newHighScoreSection.classList.add('hidden');
                newHighScoreSection.classList.remove('flex');
                standardGameOverSection.classList.remove('hidden');
                standardGameOverSection.classList.add('flex');
            }

            gameOverModal.classList.remove('hidden');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- EVENT LISTENERS ---
        
        // Difficulty Selection
        diffBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                diffBtns.forEach(b => {
                    b.classList.remove('active', 'border-slate-500', 'bg-slate-700');
                    b.classList.add('border-slate-700', 'bg-slate-900');
                });
                const target = e.target;
                target.classList.add('active', 'border-slate-500', 'bg-slate-700');
                target.classList.remove('border-slate-700', 'bg-slate-900');
                currentDifficultyName = target.dataset.diff;
            });
        });

        document.getElementById('mainStartBtn').addEventListener('click', startGame);
        document.getElementById('playAgainBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', () => {
            gameOverModal.classList.add('hidden');
            startModal.classList.remove('hidden');
        });
        
        document.getElementById('submitScoreBtn').addEventListener('click', submitHighScore);
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitHighScore();
        });

        // In-game controls
        document.getElementById('btnRestart').addEventListener('pointerdown', () => {
            if (!isAnimating) startGame();
        });

        document.getElementById('btnSound').addEventListener('pointerdown', () => {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('soundIcon');
            if (soundEnabled) {
                icon.setAttribute('d', 'M-4 -3 L-4 3 L-1 3 L2 6 L2 -6 L-1 -3 Z M5 -3 A 4 4 0 0 1 5 3');
                icon.setAttribute('stroke', '#94a3b8');
            } else {
                icon.setAttribute('d', 'M-4 -3 L-4 3 L-1 3 L2 6 L2 -6 L-1 -3 Z M4 -2 L8 2 M8 -2 L4 2');
                icon.setAttribute('stroke', '#ef4444');
            }
        });

        // Initialize application state
        document.body.addEventListener('pointerdown', initAudio, { once: true });
        fetchLeaderboard(); // Load scores immediately on mount

    </script>
</body>
</html>
