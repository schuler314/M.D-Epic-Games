<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.D Epic Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base page styling */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Slate 900 */
            color: white;
            font-family: 'Fredoka', sans-serif;
            overflow-x: hidden; /* Prevent horizontal scrolling entirely */
        }

        /* Fun animated background blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #ff0080; }
        .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #7928ca; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 400px; height: 400px; background: #00d2ff; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Header animation */
        .title-glow {
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.8)); }
            to { filter: drop-shadow(0 0 25px rgba(255, 0, 128, 0.9)); }
        }

        /* ========================================================== */
        /* GAME CARD COMPONENT (Shared Styles)                        */
        /* ========================================================== */
        .game-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            display: flex;
            height: 100%;
            cursor: pointer;
        }

        .game-card:hover {
            border-color: #00d2ff;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
        }

        .game-icon {
            border-radius: 1rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .game-card:hover .game-icon {
            transform: scale(1.1);
        }

        .play-btn {
            transition: all 0.2s ease;
            background: linear-gradient(45deg, #ff0080, #ff8c00);
            background-size: 200% auto;
            width: 100%;
            border: none;
            outline: none;
            pointer-events: none;
        }
        .game-card:hover .play-btn {
            background-position: right center;
            transform: scale(1.05) rotate(-2deg);
        }

        /* ----------------------------------------------------------------- */
        /* VIEW MODES (Applied by Toggle Buttons - Forces Layout Style)      */
        /* ----------------------------------------------------------------- */
        #device-container {
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0 auto;
        }
        
        /* --- DESKTOP MODE (Vertical Cards) --- */
        .view-desktop { width: 100%; max-width: 100%; }
        .view-desktop .responsive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .view-desktop .game-card {
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
        }
        .view-desktop .game-card:hover { transform: translateY(-15px) scale(1.03); }
        .view-desktop .game-icon { width: 6rem; height: 6rem; font-size: 3rem; margin-bottom: 1.5rem; }
        .view-desktop .game-title { font-size: 1.5rem; margin-bottom: 0.75rem; }
        .view-desktop .game-desc { font-size: 1rem; margin-bottom: 1.5rem; }
        .view-desktop .play-btn { padding: 0.75rem; font-size: 1.125rem; border-radius: 0.75rem; margin-top: auto; }

        /* --- TABLET MODE (Compact Horizontal Cards, 2 Columns) --- */
        .view-pad { width: 100%; max-width: 850px; }
        .view-pad .responsive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .view-pad .game-card {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding: 1.25rem;
            gap: 1rem;
        }
        .view-pad .game-card:hover { transform: translateY(-5px) scale(1.02); }
        .view-pad .game-icon { width: 5rem; height: 5rem; font-size: 2.25rem; margin-bottom: 0; }
        .view-pad .game-title { font-size: 1.25rem; margin-bottom: 0.25rem; }
        .view-pad .game-desc { font-size: 0.85rem; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .view-pad .play-btn { padding: 0.5rem; font-size: 0.95rem; border-radius: 0.75rem; margin-top: auto; }

        /* --- PHONE MODE (Compact Horizontal Cards, 1 Column) --- */
        .view-phone { width: 100%; max-width: 500px; }
        .view-phone .responsive-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        .view-phone .game-card {
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding: 1rem;
            gap: 1rem;
        }
        .view-phone .game-card:hover { transform: translateY(-3px) scale(1.01); }
        .view-phone .game-icon { width: 4.5rem; height: 4.5rem; font-size: 2rem; margin-bottom: 0; }
        .view-phone .game-title { font-size: 1.15rem; margin-bottom: 0.25rem; }
        .view-phone .game-desc { font-size: 0.85rem; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .view-phone .play-btn { padding: 0.5rem; font-size: 0.9rem; border-radius: 0.75rem; margin-top: auto; }
    </style>
</head>
<body class="relative">

    <!-- LOCKED BACKGROUND LAYER -->
    <!-- This completely prevents the blobs from causing a double scrollbar or widening the page! -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
        
    <!-- HUB VIEW -->
    <div id="hub-view" class="relative w-full min-h-screen">
        
        <!-- Device View Switcher UI -->
        <div class="fixed top-4 right-4 sm:right-6 z-[100] flex gap-1 sm:gap-2 bg-black/60 p-1.5 rounded-full backdrop-blur-md border border-white/20 shadow-xl">
            <button id="btn-desktop" onclick="switchView('desktop')" class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-white text-xs sm:text-sm font-bold bg-white/20 transition-colors">🖥️ Desktop</button>
            <button id="btn-pad" onclick="switchView('pad')" class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-white/60 text-xs sm:text-sm font-bold hover:bg-white/10 transition-colors"><span class="inline-block -rotate-90">📱</span> Tablet</button>
            <button id="btn-phone" onclick="switchView('phone')" class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-white/60 text-xs sm:text-sm font-bold hover:bg-white/10 transition-colors">📱 Phone</button>
        </div>

        <!-- Scalable Device Container -->
        <div id="device-container" class="view-desktop">
            <!-- Navigation / Header -->
            <nav class="p-6 text-center pt-24 md:pt-28">
                <!-- Using vw (viewport width) so the text scales fluidly without causing overflow -->
                <h1 class="text-[clamp(2.2rem,8vw,4.5rem)] font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-500 title-glow mb-2 leading-tight">
                    M.D Epic Games
                </h1>
                <p class="text-[clamp(1rem,4vw,1.5rem)] text-cyan-100 font-semibold tracking-wide">
                    The Ultimate Gaming Hub! 🎮✨
                </p>
            </nav>

            <!-- Main Content -->
            <main class="w-full px-4 sm:px-6 py-12 max-w-7xl mx-auto">
                
                <!-- Search and Filter -->
                <div class="flex justify-center mb-12">
                    <div class="relative w-full max-w-md">
                        <input type="text" id="searchInput" placeholder="Search for a game..." 
                               class="w-full px-6 py-4 rounded-full bg-white/10 border-2 border-white/20 text-white placeholder-white/50 focus:outline-none focus:border-pink-500 focus:bg-white/20 transition-all text-lg font-semibold shadow-lg">
                        <span class="absolute right-6 top-4 text-2xl">🔍</span>
                    </div>
                </div>

                <!-- Game Grid -->
                <div id="gamesContainer" class="responsive-grid">
                    <!-- Games will be injected here by JavaScript -->
                </div>

            </main>

            <!-- Footer -->
            <footer class="text-center py-8 text-white/60 font-semibold">
                <p>© 2026 M.D Epic Games. Ready, Set, PLAY!</p>
            </footer>
        </div> <!-- End Device Container -->
    </div> <!-- End Hub View -->

    <!-- GAME PLAYER VIEW (z-[200] ensures it completely covers the toggle buttons) -->
    <div id="game-view" class="hidden fixed inset-0 z-[200] flex flex-col bg-[#0f172a]">
        <!-- Player Toolbar -->
        <div class="bg-gray-900/90 backdrop-blur-md p-3 sm:p-4 flex justify-between items-center text-white shrink-0 border-b border-white/10 shadow-lg">
            <span id="playing-title" class="font-bold text-lg sm:text-xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 truncate pr-4">Game Title</span>
            <button onclick="closeGame()" class="bg-pink-600 hover:bg-pink-500 text-white px-4 py-2 sm:px-6 sm:py-2 rounded-full font-bold transition-all hover:scale-105 shadow-[0_0_15px_rgba(219,39,119,0.4)] whitespace-nowrap flex items-center gap-2 cursor-pointer text-sm sm:text-base">
                <span class="text-lg sm:text-xl leading-none -mt-0.5">⬅️</span> Back to Hub
            </button>
        </div>
        <!-- Iframe Container -->
        <div class="flex-grow relative bg-black w-full h-full">
            <iframe id="game-frame" class="absolute inset-0 w-full h-full border-0" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div> <!-- End Game View -->

    <script>
        // --- View Switcher Logic ---
        function switchView(view) {
            const container = document.getElementById('device-container');
            const btns = {
                desktop: document.getElementById('btn-desktop'),
                pad: document.getElementById('btn-pad'),
                phone: document.getElementById('btn-phone')
            };

            // Apply the layout class
            container.className = `view-${view}`;

            // Update button UI styles
            Object.keys(btns).forEach(key => {
                const btnClassBase = "px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-xs sm:text-sm font-bold transition-colors ";
                if(key === view) {
                    btns[key].className = btnClassBase + "text-white bg-white/20";
                } else {
                    btns[key].className = btnClassBase + "text-white/60 hover:bg-white/10";
                }
            });
        }

        // --- Auto Detect Optimal View on Load ---
        function initView() {
            const width = window.innerWidth;
            if (width < 600) {
                switchView('phone');
            } else if (width < 900) {
                switchView('pad');
            } else {
                switchView('desktop');
            }
        }

        // --- Game Player Logic ---
        function openGame(url, title) {
            document.body.style.overflow = 'hidden'; // Stop background scrolling
            
            // Note: We NO LONGER hide the hub-view. This completely prevents the page from losing its scroll position!
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('playing-title').innerText = title;
            
            const gameFrame = document.getElementById('game-frame');
            gameFrame.src = url;
            
            // Auto-focus the iframe so keyboard controls work immediately
            setTimeout(() => {
                gameFrame.focus();
            }, 100);
        }

        function closeGame() {
            document.body.style.overflow = ''; // Restore background scrolling
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('game-frame').src = ""; // Stop game from running in background
        }

        // =========================================================================
        // 🎮 GAME DATA MASTER LIST 🎮
        // =========================================================================
        const gamesData = [
            {
                title: "Race cars",
                description: "Zoom around the track and build the ultimate racing base!",
                icon: "🏎️",
                bgColor: "from-red-500 to-orange-500",
                url: "./games/race-cars/index.html"
            },
            {
                title: "Retro Traffic Game",
                description: "Dodge cars and cross the busy retro streets!",
                icon: "🚦",
                bgColor: "from-yellow-400 to-amber-600",
                url: "./games/retro-traffic/index.html"
            },
            {
                title: "Snakes",
                description: "Slither around, eat apples, and grow your snake!",
                icon: "🐍",
                bgColor: "from-lime-400 to-green-600",
                url: "./games/snakes/index.html"
            },
            {
                title: "Sonic the Hedgehog",
                description: "Gotta go fast! Spin dash through loops and collect rings.",
                icon: "🦔",
                bgColor: "from-blue-400 to-blue-600",
                url: "./games/sonic/index.html"
            },
            {
                title: "Neon Pac Mac",
                description: "Chomp the dots and dodge ghosts in glowing neon!",
                icon: "👻",
                bgColor: "from-fuchsia-500 to-pink-600",
                url: "./games/pacman/index.html"
            },
            {
                title: "Mountain Bike EXTREME",
                description: "Pedal to the metal! Pull off crazy tricks on the mountain.",
                icon: "🚵‍♂️",
                bgColor: "from-green-500 to-emerald-700",
                url: "./games/mountain-bike/index.html"
            },
            {
                title: "Battleship 3D",
                description: "Command your fleet and sink enemy ships in 3D!",
                icon: "🚢",
                bgColor: "from-cyan-500 to-blue-700",
                url: "./games/battleship/index.html"
            },
            {
                title: "Deep Sea Catch",
                description: "Dive deep and catch the rarest, coolest ocean fish!",
                icon: "🎣",
                bgColor: "from-teal-400 to-cyan-600",
                url: "./games/deep-sea-catch/index.html"
            },
            {
                title: "Sky Defender",
                description: "Take to the skies and defend your base from invaders!",
                icon: "✈️",
                bgColor: "from-sky-400 to-blue-600",
                url: "./games/sky-defender/index.html"
            },
            {
                title: "3D Building",
                description: "Stack blocks high into the sky to build massive towers!",
                icon: "🏗️",
                bgColor: "from-orange-400 to-amber-600",
                url: "./games/3d-building/index.html"
            },
            {
                title: "3D Basketball",
                description: "Shoot hoops and score spectacular three-pointers!",
                icon: "🏀",
                bgColor: "from-orange-500 to-red-500",
                url: "./games/3d-basketball/index.html"
            },
            {
                title: "Tetris",
                description: "The classic block-stacking puzzle game!",
                icon: "🧱",
                bgColor: "from-blue-500 to-indigo-600",
                url: "./games/tetris/index.html"
            }
        ];

        const gamesContainer = document.getElementById('gamesContainer');
        const searchInput = document.getElementById('searchInput');

        // Function to render game cards
        function renderGames(games) {
            gamesContainer.innerHTML = ''; 
            
            if (games.length === 0) {
                gamesContainer.innerHTML = `<p class="col-span-full text-center text-2xl text-white/60 mt-8">No games found! Try another search.</p>`;
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card group';
                
                card.onclick = () => openGame(game.url, game.title);

                card.innerHTML = `
                    <div class="game-icon bg-gradient-to-br ${game.bgColor} flex items-center justify-center shadow-lg">
                        ${game.icon}
                    </div>
                    <div class="game-info flex flex-col flex-1 min-w-0 h-full">
                        <h3 class="game-title font-bold text-white truncate">${game.title}</h3>
                        <p class="game-desc text-white/70 font-semibold flex-grow">${game.description}</p>
                        <div class="play-btn rounded-xl text-white font-bold shadow-lg uppercase tracking-wider text-center block w-full">
                            Play Now!
                        </div>
                    </div>
                `;
                gamesContainer.appendChild(card);
            });
        }

        // Initialize view based on current screen size BEFORE rendering
        initView();
        renderGames(gamesData);

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = gamesData.filter(game => 
                game.title.toLowerCase().includes(searchTerm) || 
                game.description.toLowerCase().includes(searchTerm)
            );
            renderGames(filteredGames);
        });
    </script>
</body>
</html>
