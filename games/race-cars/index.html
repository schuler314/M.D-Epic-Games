<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Racing Simulator - Split Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            overflow: hidden;
        }

        #carSelection {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .player-selection {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #e94560;
        }

        .player-selection:last-child {
            border-right: none;
        }

        .player-title {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .car-option {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid transparent;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .car-option:hover {
            transform: translateY(-5px);
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

        .car-option.selected {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
            transform: scale(1.05);
        }

        .car-preview {
            width: 100%;
            height: 120px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .car-name {
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .car-stats {
            color: #aaa;
            font-size: 0.9em;
        }

        .ready-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .ready-button:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        .ready-button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: scale(1);
        }

        #gameContainer {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }

        #renderCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .split-screen {
            width: 100%;
            height: 80%;
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .player-view {
            width: 50%;
            height: 100%;
            position: relative;
            border-right: 2px solid #e94560;
        }

        .player-view:last-child {
            border-right: none;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }

        .speed {
            font-size: 2em;
            color: #00ff88;
            font-weight: bold;
        }

        .lap-info {
            margin-top: 10px;
            font-size: 1em;
        }

        .view-mode {
            margin-top: 5px;
            color: #e94560;
            font-size: 0.9em;
        }

        .gear-info {
            margin-top: 5px;
            color: #ffaa00;
            font-size: 1em;
        }

        .elevation-info {
            margin-top: 5px;
            color: #00d2ff;
            font-size: 0.9em;
        }

        .surface-info {
            margin-top: 5px;
            color: #ff6b6b;
            font-size: 0.9em;
        }

        .minimap-container {
            width: 100%;
            height: 20%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #e94560;
            position: absolute;
            bottom: 0;
            z-index: 5;
        }

        #minimap {
            width: 90%;
            height: 90%;
            background: #0f0f1e;
            border: 2px solid #e94560;
            border-radius: 10px;
        }

        .controls-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            color: #fff;
            font-size: 0.8em;
            text-align: right;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }

        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10em;
            color: #e94560;
            font-weight: bold;
            text-shadow: 0 0 20px #e94560;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Car Selection Screen -->
    <div id="carSelection">
        <div class="player-selection">
            <div class="player-title">Player 1 - WASD</div>
            <div class="car-grid" id="player1Cars"></div>
            <button class="ready-button" id="player1Ready" disabled>Ready</button>
        </div>
        <div class="player-selection">
            <div class="player-title">Player 2 - Arrows</div>
            <div class="car-grid" id="player2Cars"></div>
            <button class="ready-button" id="player2Ready" disabled>Ready</button>
        </div>
    </div>

    <!-- Game Container -->
    <div id="gameContainer">
        <canvas id="renderCanvas"></canvas>
        <div class="split-screen">
            <div class="player-view" id="player1View">
                <div class="hud">
                    <div class="speed" id="p1Speed">0 KM/H</div>
                    <div class="lap-info" id="p1Lap">Lap: 1/3</div>
                    <div class="gear-info" id="p1Gear">Gear: 1</div>
                    <div class="elevation-info" id="p1Elevation">Alt: 0m</div>
                    <div class="surface-info" id="p1Surface">On Track</div>
                    <div class="view-mode" id="p1ViewMode">View: Chase</div>
                </div>
            </div>
            <div class="player-view" id="player2View">
                <div class="hud">
                    <div class="speed" id="p2Speed">0 KM/H</div>
                    <div class="lap-info" id="p2Lap">Lap: 1/3</div>
                    <div class="gear-info" id="p2Gear">Gear: 1</div>
                    <div class="elevation-info" id="p2Elevation">Alt: 0m</div>
                    <div class="surface-info" id="p2Surface">On Track</div>
                    <div class="view-mode" id="p2ViewMode">View: Chase</div>
                </div>
            </div>
        </div>
        <div class="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
        <div class="controls-info">
            <div><strong>Player 1:</strong> WASD = Move | Q/E = Change View</div>
            <div><strong>Player 2:</strong> Arrows = Move | [/] = Change View</div>
        </div>
        <div class="countdown" id="countdown">3</div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const cars = [
    { name: 'Red Bull Racing', icon: '🏎️', color: 0x0600ef, speed: 95, handling: 90 },
    { name: 'Mercedes AMG', icon: '🏎️', color: 0x00d2be, speed: 92, handling: 94 },
    { name: 'Ferrari', icon: '🏎️', color: 0xdc0000, speed: 93, handling: 91 },
    { name: 'McLaren', icon: '🏎️', color: 0xff8700, speed: 90, handling: 95 },
    { name: 'Alpine', icon: '🏎️', color: 0x0090ff, speed: 88, handling: 88 }
];

let player1Selected = null;
let player2Selected = null;
let player1Ready = false;
let player2Ready = false;

function populateCarSelection() {
    const p1Grid = document.getElementById('player1Cars');
    const p2Grid = document.getElementById('player2Cars');
    cars.forEach((car, index) => {
        p1Grid.appendChild(createCarOption(car, index, 1));
        p2Grid.appendChild(createCarOption(car, index, 2));
    });
}

function createCarOption(car, index, player) {
    const option = document.createElement('div');
    option.className = 'car-option';
    option.innerHTML = `
        <div class="car-preview" style="background: linear-gradient(45deg, #${car.color.toString(16).padStart(6, '0')}, #${((car.color + 0x333333) & 0xffffff).toString(16).padStart(6, '0')})">${car.icon}</div>
        <div class="car-name">${car.name}</div>
        <div class="car-stats">Speed: ${car.speed} | Handle: ${car.handling}</div>
    `;
    option.addEventListener('click', () => selectCar(index, player, option));
    return option;
}

function selectCar(index, player, element) {
    const playerPrefix = player === 1 ? 'player1' : 'player2';
    const grid = document.getElementById(`${playerPrefix}Cars`);
    grid.querySelectorAll('.car-option').forEach(opt => opt.classList.remove('selected'));
    element.classList.add('selected');
    if (player === 1) {
        player1Selected = index;
        document.getElementById('player1Ready').disabled = false;
    } else {
        player2Selected = index;
        document.getElementById('player2Ready').disabled = false;
    }
}

function checkBothReady() {
    if (player1Ready && player2Ready) {
        setTimeout(startGame, 1000);
    }
}

document.getElementById('player1Ready').addEventListener('click', function() {
    player1Ready = true;
    this.style.background = '#00ff88';
    this.textContent = 'READY!';
    this.disabled = true;
    checkBothReady();
});

document.getElementById('player2Ready').addEventListener('click', function() {
    player2Ready = true;
    this.style.background = '#00ff88';
    this.textContent = 'READY!';
    this.disabled = true;
    checkBothReady();
});

populateCarSelection();

let scene, renderer, player1Camera, player2Camera, player1Car, player2Car;
let trackPoints = [];
let barrierPositions = [];
let gameStarted = false, raceStarted = false, raceStartTime = 0;
const keys = {};
const player1Controls = { forward: 'w', backward: 's', left: 'a', right: 'd', viewLeft: 'q', viewRight: 'e' };
const player2Controls = { forward: 'ArrowUp', backward: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', viewLeft: '[', viewRight: ']' };
let player1ViewMode = 0, player2ViewMode = 0;
let audioContext, player1Engine, player2Engine;

function startGame() {
    document.getElementById('carSelection').style.display = 'none';
    document.getElementById('gameContainer').style.display = 'block';
    initAudio();
    initThreeJS();
    createTrack();
    createCars();
    setupControls();
    setTimeout(() => showCountdown(), 100);
}

function initAudio() {
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        player1Engine = createEngineSound();
        player2Engine = createEngineSound();
    } catch (e) {
        console.log('Audio not supported');
    }
}

function playCountdownBeep(pitch) {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(pitch, audioContext.currentTime);
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + 0.3);
}

function playGoSound() {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioContext.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.15);
    gain.gain.setValueAtTime(0.4, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime + 0.5);
}

function createEngineSound() {
    if (!audioContext) return { oscillators: [], gainNodes: [], filters: [], noiseSource: null, baseFrequency: 100 };
    const oscillators = [], gainNodes = [], filters = [];
    for (let i = 0; i < 3; i++) {
        const osc = audioContext.createOscillator();
        osc.type = i === 1 ? 'square' : 'sawtooth';
        osc.frequency.value = 100 * (i + 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        const filter = audioContext.createBiquadFilter();
        filter.type = i === 0 ? 'lowpass' : i === 1 ? 'bandpass' : 'highpass';
        filter.frequency.value = 800 + i * 600;
        if (i === 1) filter.Q.value = 2;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);
        osc.start();
        oscillators.push(osc);
        gainNodes.push(gain);
        filters.push(filter);
    }
    const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
    const noiseSource = audioContext.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;
    const noiseGain = audioContext.createGain();
    noiseGain.gain.value = 0;
    const noiseFilter = audioContext.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 1000;
    noiseFilter.Q.value = 1;
    noiseSource.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(audioContext.destination);
    noiseSource.start();
    gainNodes.push(noiseGain);
    filters.push(noiseFilter);
    return { oscillators, gainNodes, filters, noiseSource, baseFrequency: 100 };
}

function updateEngineSound(engine, speed) {
    if (!engine.oscillators || engine.oscillators.length === 0) return;
    const normalizedSpeed = Math.abs(speed) / 4;
    const rpm = 800 + (normalizedSpeed * 8000);
    const baseFreq = 80 + (rpm / 50);
    engine.oscillators[0].frequency.setTargetAtTime(baseFreq, audioContext.currentTime, 0.05);
    engine.filters[0].frequency.setTargetAtTime(600 + rpm / 8, audioContext.currentTime, 0.05);
    engine.gainNodes[0].gain.setTargetAtTime(Math.min(0.15, normalizedSpeed * 0.12), audioContext.currentTime, 0.03);
    engine.oscillators[1].frequency.setTargetAtTime(baseFreq * 2, audioContext.currentTime, 0.05);
    engine.filters[1].frequency.setTargetAtTime(1000 + rpm / 6, audioContext.currentTime, 0.05);
    engine.gainNodes[1].gain.setTargetAtTime(Math.min(0.08, normalizedSpeed * 0.06), audioContext.currentTime, 0.03);
    engine.oscillators[2].frequency.setTargetAtTime(baseFreq * 3, audioContext.currentTime, 0.05);
    engine.filters[2].frequency.setTargetAtTime(2000 + rpm / 4, audioContext.currentTime, 0.05);
    engine.gainNodes[2].gain.setTargetAtTime(Math.min(0.05, normalizedSpeed * 0.04), audioContext.currentTime, 0.03);
    engine.filters[3].frequency.setTargetAtTime(800 + rpm / 10, audioContext.currentTime, 0.05);
    engine.gainNodes[3].gain.setTargetAtTime(Math.min(0.03, normalizedSpeed * 0.025), audioContext.currentTime, 0.03);
}

function initThreeJS() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 200, 1500);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(100, 150, 100);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.left = -1200;
    directionalLight.shadow.camera.right = 1200;
    directionalLight.shadow.camera.top = 1200;
    directionalLight.shadow.camera.bottom = -1200;
    scene.add(directionalLight);
    const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
    directionalLight2.position.set(-100, 100, -100);
    scene.add(directionalLight2);
    const canvas = document.getElementById('renderCanvas');
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    player1Camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / (window.innerHeight * 0.8), 0.1, 2000);
    player2Camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / (window.innerHeight * 0.8), 0.1, 2000);
    createTerrain();
}

function createTerrain() {
    const terrainSize = 5000, terrainSegments = 150;
    const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
    const vertices = terrainGeometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        const x = vertices[i], z = vertices[i + 1];
        vertices[i + 2] = Math.sin(x / 200) * 15 + Math.cos(z / 180) * 12 + Math.sin(x / 300 + z / 250) * 8;
    }
    terrainGeometry.computeVertexNormals();
    const terrain = new THREE.Mesh(terrainGeometry, new THREE.MeshLambertMaterial({ color: 0x2d5016 }));
    terrain.rotation.x = -Math.PI / 2;
    terrain.receiveShadow = true;
    scene.add(terrain);
}

function isNearOtherSegment(point, currentIdx, threshold = 35) {
    for (let i = 0; i < trackPoints.length; i++) {
        if (Math.abs(i - currentIdx) < 50) continue;
        const otherPoint = trackPoints[i];
        const dist = Math.sqrt(Math.pow(point.x - otherPoint.x, 2) + Math.pow(point.z - otherPoint.z, 2));
        if (dist < threshold) return true;
    }
    return false;
}

function createArrowTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0, 0, 0, 0)';
    ctx.fillRect(0, 0, 128, 256);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(44, 80, 40, 120);
    ctx.beginPath();
    ctx.moveTo(64, 20);
    ctx.lineTo(20, 100);
    ctx.lineTo(108, 100);
    ctx.closePath();
    ctx.fill();
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

function calculateTrackWidth(prevPoint, currentPoint, nextPoint, baseWidth = 32) {
    if (!prevPoint || !nextPoint) return baseWidth;
    
    const v1 = new THREE.Vector2(currentPoint.x - prevPoint.x, currentPoint.z - prevPoint.z).normalize();
    const v2 = new THREE.Vector2(nextPoint.x - currentPoint.x, nextPoint.z - currentPoint.z).normalize();
    
    const dot = v1.dot(v2);
    const angle = Math.acos(Math.max(-1, Math.min(1, dot)));
    const angleDegrees = angle * (180 / Math.PI);
    
    let widthMultiplier = 1.0;
    
    if (angleDegrees > 120) {
        widthMultiplier = 3.0;
    } else if (angleDegrees > 90) {
        widthMultiplier = 2.5;
    } else if (angleDegrees > 60) {
        widthMultiplier = 2.0;
    } else if (angleDegrees > 30) {
        widthMultiplier = 1.5;
    } else if (angleDegrees > 10) {
        widthMultiplier = 1.2;
    }
    
    return baseWidth * widthMultiplier;
}

        { x: 0, z: -130, elevation: 25 },
        { x: 0, z: -160, elevation: 25 },
        { x: 0, z: -190, elevation: 25 }
    ];

    const segments = 1500;
    for (let i = 0; i < segments; i++) {
        const t = i / segments;
        const totalPoints = rawPoints.length;
        const exactIdx = t * totalPoints;
        const i1 = Math.floor(exactIdx) % totalPoints;
        const i2 = (i1 + 1) % totalPoints;
        const localT = exactIdx - Math.floor(exactIdx);
        const p1 = rawPoints[i1], p2 = rawPoints[i2];
        const smoothT = localT * localT * (3 - 2 * localT);
        const x = p1.x + (p2.x - p1.x) * smoothT;
        const z = p1.z + (p2.z - p1.z) * smoothT;
        const elevation = p1.elevation + (p2.elevation - p1.elevation) * smoothT;
        trackPoints.push(new THREE.Vector3(x, elevation, z));
    }

    const trackMaterial = new THREE.MeshLambertMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide });
    const startLineMaterial = new THREE.MeshLambertMaterial({ color: 0xffaa00, emissive: 0x553300, side: THREE.DoubleSide });
    const arrowTexture = createArrowTexture();
    const arrowMaterial = new THREE.MeshBasicMaterial({ map: arrowTexture, transparent: true, side: THREE.DoubleSide });

    for (let i = 0; i < trackPoints.length; i++) {
        const prev = trackPoints[(i - 1 + trackPoints.length) % trackPoints.length];
        const current = trackPoints[i];
        const next = trackPoints[(i + 1) % trackPoints.length];
        const nextNext = trackPoints[(i + 2) % trackPoints.length];
        
        const direction = new THREE.Vector3().subVectors(next, current);
        const length = direction.length();
        if (length < 0.01) continue;
        direction.normalize();

        const trackWidth = calculateTrackWidth(prev, current, nextNext, baseTrackWidth);

        const trackGeometry = new THREE.BoxGeometry(trackWidth, 1.5, length + 0.2);
        const material = (i < 15) ? startLineMaterial : trackMaterial;
        const trackSegment = new THREE.Mesh(trackGeometry, material);
        const midPoint = new THREE.Vector3().addVectors(current, next).multiplyScalar(0.5);
        trackSegment.position.copy(midPoint);

        const dx = next.x - current.x, dz = next.z - current.z, dy = next.y - current.y;
        const horizontalDist = Math.sqrt(dx * dx + dz * dz);
        const pitchAngle = Math.atan2(dy, horizontalDist);
        const yawAngle = Math.atan2(dz, dx);
        trackSegment.rotation.y = yawAngle - Math.PI / 2;
        trackSegment.rotation.x = pitchAngle;
        trackSegment.receiveShadow = true;
        trackSegment.castShadow = true;
        scene.add(trackSegment);

        if (i % 60 === 0) {
            const arrowGeometry = new THREE.PlaneGeometry(8, 16);
            const arrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
            arrow.position.copy(midPoint);
            arrow.position.y += 0.8;
            arrow.rotation.x = -Math.PI / 2 + pitchAngle;
            arrow.rotation.z = yawAngle + Math.PI / 2;
            scene.add(arrow);
        }

        const nearIntersection = isNearOtherSegment(midPoint, i);
        if (i % 15 === 0 && !nearIntersection) {
            const barrierOffset = trackWidth / 2 + 3;
            createElevatedBarrier(current, next, barrierOffset, i % 6 === 0 ? 0xff0000 : 0xffffff);
            createElevatedBarrier(current, next, -barrierOffset, i % 6 === 3 ? 0xff0000 : 0xffffff);
        }
    }
}

function createElevatedBarrier(point1, point2, offset, color) {
    const direction = new THREE.Vector3().subVectors(point2, point1);
    const length = direction.length();
    direction.normalize();
    const perpendicular = new THREE.Vector3(-direction.z, 0, direction.x).multiplyScalar(offset);
    const barrierGeometry = new THREE.BoxGeometry(2, 3, length + 0.5);
    const barrierMaterial = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
    const barrier = new THREE.Mesh(barrierGeometry, barrierMaterial);
    const midPoint = new THREE.Vector3().addVectors(point1, point2).multiplyScalar(0.5);
    midPoint.add(perpendicular);
    barrier.position.copy(midPoint);
    barrier.position.y += 1.5;
    barrierPositions.push({ x: midPoint.x, z: midPoint.z, y: midPoint.y, radius: 3 });
    const dx = point2.x - point1.x, dz = point2.z - point1.z, dy = point2.y - point1.y;
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    const pitchAngle = Math.atan2(dy, horizontalDist);
    const yawAngle = Math.atan2(dz, dx);
    barrier.rotation.y = yawAngle - Math.PI / 2;
    barrier.rotation.x = pitchAngle;
    barrier.castShadow = true;
    scene.add(barrier);
}

function createCar(color) {
    const car = new THREE.Group();
    const bodyGeometry = new THREE.BoxGeometry(2, 0.5, 4);
    const bodyMaterial = new THREE.MeshPhongMaterial({ color, shininess: 100, specular: 0x555555 });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.position.y = 0.5;
    body.castShadow = true;
    car.add(body);
    const cockpitGeometry = new THREE.BoxGeometry(1.5, 0.5, 1.5);
    const cockpit = new THREE.Mesh(cockpitGeometry, bodyMaterial);
    cockpit.position.y = 1;
    cockpit.position.z = 0.2;
    cockpit.castShadow = true;
    car.add(cockpit);
    const wingGeometry = new THREE.BoxGeometry(2.5, 0.1, 0.3);
    const wingMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const frontWing = new THREE.Mesh(wingGeometry, wingMaterial);
    frontWing.position.z = -2.2;
    frontWing.position.y = 0.2;
    car.add(frontWing);
    const rearWingPost = new THREE.BoxGeometry(0.2, 0.8, 0.2);
    const post1 = new THREE.Mesh(rearWingPost, wingMaterial);
    post1.position.set(-0.7, 1, 1.8);
    car.add(post1);
    const post2 = new THREE.Mesh(rearWingPost, wingMaterial);
    post2.position.set(0.7, 1, 1.8);
    car.add(post2);
    const rearWing = new THREE.Mesh(wingGeometry, wingMaterial);
    rearWing.position.z = 1.8;
    rearWing.position.y = 1.4;
    car.add(rearWing);
    const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
    const wheelMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
    const wheelPositions = [[-1.2, 0.4, -1.5], [1.2, 0.4, -1.5], [-1.2, 0.4, 1.5], [1.2, 0.4, 1.5]];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        wheel.castShadow = true;
        car.add(wheel);
    });
    return car;
}

function checkSurface(car) {
    const data = car.userData;
    let onTrack = false, closestDist = Infinity, closestIdx = 0;
    for (let i = 0; i < trackPoints.length; i++) {
        const point = trackPoints[i];
        const dist = Math.sqrt(Math.pow(point.x - car.position.x, 2) + Math.pow(point.z - car.position.z, 2));
        if (dist < closestDist) { closestDist = dist; closestIdx = i; }
    }
    
    const prev = trackPoints[(closestIdx - 1 + trackPoints.length) % trackPoints.length];
    const current = trackPoints[closestIdx];
    const nextNext = trackPoints[(closestIdx + 2) % trackPoints.length];
    const dynamicWidth = calculateTrackWidth(prev, current, nextNext, 32);
    
    if (closestDist < dynamicWidth / 2) { 
        onTrack = true; 
        data.surface = 'track'; 
    } else { 
        onTrack = false; 
        data.surface = 'grass'; 
    }
    
    let hitBarrier = false;
    for (let barrier of barrierPositions) {
        const dist = Math.sqrt(Math.pow(barrier.x - car.position.x, 2) + Math.pow(barrier.z - car.position.z, 2));
        if (dist < barrier.radius) { hitBarrier = true; data.surface = 'barrier'; break; }
    }
    data.onTrack = onTrack && !hitBarrier;
    return { onTrack: data.onTrack, hitBarrier, surface: data.surface, closestIdx };
}

function handleCarCollision() {
    const p1Data = player1Car.userData;
    const p2Data = player2Car.userData;
    
    if (p1Data.collisionCooldown > 0) p1Data.collisionCooldown--;
    if (p2Data.collisionCooldown > 0) p2Data.collisionCooldown--;
    
    const dx = player2Car.position.x - player1Car.position.x;
    const dz = player2Car.position.z - player1Car.position.z;
    const distance = Math.sqrt(dx * dx + dz * dz);
    
    const collisionRadius = 5;
    
    if (distance < collisionRadius && p1Data.collisionCooldown === 0 && p2Data.collisionCooldown === 0) {
        console.log(`COLLISION! P1 (Color: 0x${p1Data.carColor.toString(16)}) vs P2 (Color: 0x${p2Data.carColor.toString(16)})`);
        
        const normalX = dx / distance;
        const normalZ = dz / distance;
        
        const p1VelX = -Math.sin(player1Car.rotation.y) * p1Data.speed;
        const p1VelZ = -Math.cos(player1Car.rotation.y) * p1Data.speed;
        const p2VelX = -Math.sin(player2Car.rotation.y) * p2Data.speed;
        const p2VelZ = -Math.cos(player2Car.rotation.y) * p2Data.speed;
        
        const relVelX = p1VelX - p2VelX;
        const relVelZ = p1VelZ - p2VelZ;
        
        const velAlongNormal = relVelX * normalX + relVelZ * normalZ;
        
        if (velAlongNormal < 0) {
            const restitution = 0.7;
            const impulse = -(1 + restitution) * velAlongNormal / 2;
            const impulseX = impulse * normalX;
            const impulseZ = impulse * normalZ;
            
            p1Data.speed *= 0.6;
            player1Car.position.x -= impulseX * 1.2;
            player1Car.position.z -= impulseZ * 1.2;
            
            const speedBoost = Math.abs(impulse) * 0.4;
            p2Data.speed += speedBoost;
            p2Data.speed = Math.min(p2Data.speed, p2Data.maxSpeed * 1.3);
            player2Car.position.x += impulseX * 1.2;
            player2Car.position.z += impulseZ * 1.2;
            
            const rotationChange = impulse * 0.08;
            player1Car.rotation.y += rotationChange;
            player2Car.rotation.y -= rotationChange;
            
            p1Data.collisionCooldown = 45;
            p2Data.collisionCooldown = 45;
        }
    }
}

function updateCar(car, controls) {
    if (!raceStarted) return;
    const data = car.userData;
    const surfaceInfo = checkSurface(car);
    
    if (keys[controls.forward]) {
        data.speed = Math.min(data.speed + data.acceleration, data.maxSpeed);
        const speedRatio = Math.abs(data.speed) / data.maxSpeed;
        if (speedRatio < 0.2) data.gear = 1;
        else if (speedRatio < 0.4) data.gear = 2;
        else if (speedRatio < 0.6) data.gear = 3;
        else if (speedRatio < 0.8) data.gear = 4;
        else data.gear = 5;
    } else if (keys[controls.backward]) {
        if (data.speed > 0.1) { data.speed = Math.max(data.speed - data.brake, 0); data.gear = 1; }
        else { data.speed = Math.max(data.speed - data.acceleration * 0.5, -data.maxSpeed * 0.4); data.gear = -1; }
    } else {
        if (Math.abs(data.speed) < 0.01) data.speed = 0;
        else data.speed *= (1 - data.friction);
    }
    
    if (surfaceInfo.hitBarrier) data.speed *= 0.70;
    else if (!surfaceInfo.onTrack) data.speed *= 0.70;
    
    const speedRatio = Math.abs(data.speed) / data.maxSpeed;
    const turnMultiplier = 3.0 + (speedRatio * 1.0);
    const effectiveTurnSpeed = data.baseTurnSpeed * turnMultiplier;
    
    if (keys[controls.left]) car.rotation.y += effectiveTurnSpeed;
    if (keys[controls.right]) car.rotation.y -= effectiveTurnSpeed;
    
    const newX = car.position.x - Math.sin(car.rotation.y) * data.speed;
    const newZ = car.position.z - Math.cos(car.rotation.y) * data.speed;
    const closestIdx = surfaceInfo.closestIdx;
    const nextIdx = (closestIdx + 1) % trackPoints.length;
    const currentPoint = trackPoints[closestIdx];
    const nextPoint = trackPoints[nextIdx];
    const dx = nextPoint.x - currentPoint.x, dz = nextPoint.z - currentPoint.z, dy = nextPoint.y - currentPoint.y;
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    const trackPitch = Math.atan2(dy, horizontalDist);
    data.targetPitch = trackPitch;
    car.position.x = newX;
    car.position.z = newZ;
    car.position.y += (currentPoint.y + 1 - car.position.y) * 0.18;
    const pitchLerpSpeed = 0.15;
    car.rotation.x += (data.targetPitch - car.rotation.x) * pitchLerpSpeed;
    updateLapProgress(car);
}

function updateLapProgress(car) {
    const data = car.userData;
    const startPoint = trackPoints[7];
    const distToStart = Math.sqrt(Math.pow(startPoint.x - car.position.x, 2) + Math.pow(startPoint.z - car.position.z, 2));
    const nearStartLine = distToStart < 40;
    const progressThreshold = trackPoints.length * 0.9;
    const currentTime = Date.now();
    const timeSinceLastLap = (currentTime - data.lastLapTime) / 1000;
    const checkpointDistance = 50;
    for (let i = 0; i < trackPoints.length; i++) {
        const point = trackPoints[i];
        const dist2D = Math.sqrt(Math.pow(point.x - car.position.x, 2) + Math.pow(point.z - car.position.z, 2));
        if (dist2D < checkpointDistance && i > data.checkpointIndex + 20) data.checkpointIndex = i;
    }
    if (nearStartLine && data.checkpointIndex >= progressThreshold) {
        if (data.lastLapTime === 0 || timeSinceLastLap >= 5) {
            data.lap++;
            data.checkpointIndex = 0;
            data.lastLapTime = currentTime;
            console.log(`Player ${data.playerNum} - Lap ${data.lap - 1} completed in ${timeSinceLastLap.toFixed(2)}s`);
        }
    }
}

function updateCamera(camera, car, viewMode) {
    const offset = new THREE.Vector3(), lookAt = new THREE.Vector3();
    switch (viewMode) {
        case 0: offset.set(0, 5, 12); lookAt.set(0, 0, -15); break;
        case 1: offset.set(0, 2, 2.5); lookAt.set(0, 1.5, -15); break;
        case 2: offset.set(0, 1.3, 0.5); lookAt.set(0, 1.2, -15); break;
    }
    offset.applyQuaternion(car.quaternion);
    lookAt.applyQuaternion(car.quaternion);
    camera.position.copy(car.position).add(offset);
    camera.lookAt(car.position.clone().add(lookAt));
}

function drawMinimap() {
    const canvas = document.getElementById('minimap');
    const ctx = canvas.getContext('2d');
    const width = canvas.width = canvas.clientWidth;
    const height = canvas.height = canvas.clientHeight;
    ctx.clearRect(0, 0, width, height);
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    trackPoints.forEach(point => { minX = Math.min(minX, point.x); maxX = Math.max(maxX, point.x); minZ = Math.min(minZ, point.z); maxZ = Math.max(maxZ, point.z); });
    const trackW = maxX - minX, trackH = maxZ - minZ;
    const scale = Math.min(width / trackW, height / trackH) * 0.85;
    const centerX = width / 2, centerY = height / 2, offsetX = (minX + maxX) / 2, offsetZ = (minZ + maxZ) / 2;
    ctx.lineWidth = 5;
    trackPoints.forEach((point, i) => {
        const x = centerX + (point.x - offsetX) * scale;
        const y = centerY + (point.z - offsetZ) * scale;
        const elevationRatio = (point.y - 20) / 45;
        const red = Math.floor(255 * (1 - elevationRatio));
        const green = Math.floor(255 * elevationRatio);
        ctx.strokeStyle = `rgb(${red}, ${green}, 100)`;
        if (i === 0) ctx.moveTo(x, y);
        else {
            const prevPoint = trackPoints[i - 1];
            const prevX = centerX + (prevPoint.x - offsetX) * scale;
            const prevY = centerY + (prevPoint.z - offsetZ) * scale;
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    });
    const startX = centerX + (trackPoints[0].x - offsetX) * scale;
    const startY = centerY + (trackPoints[0].z - offsetZ) * scale;
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(startX - 5, startY - 5, 10, 10);
    function drawCarOnMap(car, color, label) {
        const x = centerX + (car.position.x - offsetX) * scale;
        const y = centerY + (car.position.z - offsetZ) * scale;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(label, x + 10, y + 5);
    }
    drawCarOnMap(player1Car, '#00ff88', 'P1');
    drawCarOnMap(player2Car, '#ff6b81', 'P2');
}

function animate() {
    if (!gameStarted) return;
    requestAnimationFrame(animate);
    updateCar(player1Car, player1Controls);
    updateCar(player2Car, player2Controls);
    handleCarCollision();
    updateCamera(player1Camera, player1Car, player1ViewMode);
    updateCamera(player2Camera, player2Car, player2ViewMode);
    updateHUD();
    drawMinimap();
    const width = window.innerWidth, height = window.innerHeight * 0.8;
    renderer.setScissorTest(true);
    renderer.setViewport(0, window.innerHeight * 0.2, width / 2, height);
    renderer.setScissor(0, window.innerHeight * 0.2, width / 2, height);
    renderer.render(scene, player1Camera);
    renderer.setViewport(width / 2, window.innerHeight * 0.2, width / 2, height);
    renderer.setScissor(width / 2, window.innerHeight * 0.2, width / 2, height);
    renderer.render(scene, player2Camera);
    renderer.setScissorTest(false);
}

function onWindowResize() {
    const width = window.innerWidth, height = window.innerHeight * 0.8;
    player1Camera.aspect = (width / 2) / height;
    player1Camera.updateProjectionMatrix();
    player2Camera.aspect = (width / 2) / height;
    player2Camera.updateProjectionMatrix();
    renderer.setSize(width, window.innerHeight);
}
    </script>
